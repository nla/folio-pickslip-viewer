spring.security.oauth2.client.registration.picklist-viewer.provider=keycloak
spring.security.oauth2.client.registration.picklist-viewer.client-id=picklist-viewer
spring.security.oauth2.client.registration.picklist-viewer.client-secret=not_the_secret
spring.security.oauth2.client.registration.picklist-viewer.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.picklist-viewer.scope=openid
spring.security.oauth2.client.provider.keycloak.issuer-uri=not_the_realm_url
spring.security.oauth2.resourceserver.jwt.issuer-uri=not_the_realm_url

server.servlet.context-path=/requests
#logging.level.au=DEBUG


server.error.include-stacktrace=never
server.error.include-message=never

schedule.retriever.cron.peak=0 * 7-17 ? * MON-FRI
schedule.retriever.cron=0 */5 * ? * ?
schedule.retriever.enabled=true

spring.config.import=stacklocations-spec.yml, unicode-font-map.yml

folio.request-view-prefix = not_the_prefix
folio.request-view-postfix = ?filters=requestStatus.Open - Not yet filled&sort=requestDate
folio.requests.limit=4000
folio.pickslips.limit=4000
folio.async.concurrency=8

# must match FOLIO config
folio.note-type.access-conditions=Restrictions on Access note
folio.note-type.terms-of-use=Terms Governing Use and Reproduction note
folio.note-type.spine-label=Local 591 Spine Binding note

folio.alt-title-type.variant-title=Variant title

folio.api-url= # set at runtime
folio.tenant= # set at runtime
folio.username= # set at runtime
folio.password= # set at runtime

folio.request-edit-role-uuid= # set at runtime

# Tomcat Access Logs (stdout)
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%t %a "%r" %s (%D ms)
server.tomcat.accesslog.directory=/dev
server.tomcat.accesslog.prefix=stdout
server.tomcat.accesslog.suffix=
server.tomcat.accesslog.rotate=false
server.tomcat.accesslog.rename-on-rotate=false
server.tomcat.accesslog.file-date-format=

# HTTP Request/Response Logging (Configuration Only)
# Log all web requests/responses
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web=DEBUG

# Log HTTP client requests (RestTemplate, RestClient, WebClient)
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.springframework.web.client.RestClient=DEBUG
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=DEBUG

# Log HTTP headers (but not body)
spring.mvc.log-request-details=true
spring.mvc.log-resolved-exception=true

# Apache HttpClient logging (if used by FOLIO API)
logging.level.org.apache.http=DEBUG
logging.level.org.apache.http.headers=DEBUG
logging.level.org.apache.http.wire=DEBUG

